version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    environment:
      POSTGRES_DB: healthcare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare-api
    ports:
      - "8080:8080"
    environment:
      DB_NAME: healthcare_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DJANGO_SECRET_KEY: "SuperSecretKeyForHealthcareAppointmentSystem2024!MustBe32CharsMin"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      JWT_KEY: "SuperSecretKeyForHealthcareAppointmentSystem2024!MustBe32CharsMin"
      JWT_ISSUER: "HealthcareAppointmentSystem"
      JWT_AUDIENCE: "HealthcareAppointmentSystem"
      JWT_EXPIRES_IN_MINUTES: "60"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    container_name: healthcare-web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
